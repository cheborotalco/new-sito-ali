<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alisa Chebotarenko | PMP Project Manager</title>
    <meta name="description" content="Portfolio personale di Alisa Chebotarenko, Project Manager certificata PMP. Scopri competenze, progetti e contatti." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-portfolio-contactapi-91fd3b7.js"></script>
    <script type="module">
      const updateTelegramLink = () => {
        document.querySelectorAll('a[href="https://t.me/alisachebotarenko"]').forEach(link => {
          link.href = 'https://t.me/alichebo';
        });
      };
      const addWeChatLink = () => {
        document.querySelectorAll('.contact-actions-row').forEach(row => {
          if (row.querySelector('.wechat-icon')) return;
          const copyWeChatId = async () => {
            try {
              await navigator.clipboard.writeText('alichebo');
              return true;
            } catch {
              const field = document.createElement('textarea');
              field.value = 'alichebo';
              field.setAttribute('readonly', '');
              field.style.position = 'fixed';
              field.style.opacity = '0';
              document.body.appendChild(field);
              field.select();
              const copied = document.execCommand('copy');
              field.remove();
              return copied;
            }
          };
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'circle-btn-elegant social-icon wechat-icon';
          button.setAttribute('aria-label', 'Copy WeChat ID alichebo');
          button.title = 'WeChat: alichebo';
          button.innerHTML = '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M26.6 14C14.7 14 5 21.6 5 31c0 5.3 3 10 7.8 13.1L11 50.7c-.2.8.6 1.4 1.3 1l7.6-4.1c2.1.6 4.3.9 6.7.9 11.9 0 21.6-7.6 21.6-17S38.5 14 26.6 14Z" fill="currentColor"/><path d="M45.9 29.4c7.8 1.8 13.1 7.1 13.1 13.6 0 4.4-2.5 8.4-6.5 11l1.5 5.1c.2.7-.5 1.2-1.1.9l-6.1-3.2c-1.7.4-3.5.7-5.4.7-7.7 0-14.2-4.2-16.3-10 1 .1 2 .2 3 .2 12.4 0 22.6-7.6 22.6-17 0-.4 0-.8-.1-1.2Z" fill="currentColor" opacity=".72"/><circle cx="19.2" cy="28.4" r="2.9" fill="#fff"/><circle cx="33.2" cy="28.4" r="2.9" fill="#fff"/><circle cx="38.8" cy="42.8" r="2.4" fill="#fff"/><circle cx="50" cy="42.8" r="2.4" fill="#fff"/></svg><span class="wechat-copy-label">Copied</span>';
          button.addEventListener('click', async () => {
            if (await copyWeChatId()) {
              button.setAttribute('aria-label', 'WeChat ID copied');
              button.classList.add('copied');
              setTimeout(() => button.classList.remove('copied'), 1400);
            }
          });
          row.appendChild(button);
        });
      };
      const updateContactLinks = () => {
        updateTelegramLink();
        addWeChatLink();
      };
      window.addEventListener('load', updateContactLinks);
      setTimeout(updateContactLinks, 500);
    </script>
    <link rel="stylesheet" crossorigin href="/assets/index-portfolio-contactthanks-4c8a19e.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
