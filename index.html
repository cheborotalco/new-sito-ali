                if (event.target.matches('[data-close-wechat]')) {
                  modal.classList.remove('is-open');
                  document.body.classList.remove('wechat-modal-open');
                }
              });
              window.addEventListener('keydown', event => {

    const removeMobileNavbarCta = () => {
      if (!window.matchMedia("(max-width: 1100px)").matches) return;
      document.querySelectorAll(".navbar-tech .btn-tech").forEach((link) => link.remove());
    };
    window.addEventListener("load", removeMobileNavbarCta);
    window.addEventListener("resize", removeMobileNavbarCta);
    setTimeout(removeMobileNavbarCta, 100);
    setTimeout(removeMobileNavbarCta, 500);
    new MutationObserver(removeMobileNavbarCta).observe(document.documentElement, { childList: true, subtree: true });

    const normalizeMobileNavigation = () => {
      const nav = document.querySelector(".navbar-tech .nav-links-tech");
      if (!nav) return;

      const items = [
        ["#about", "01.", "About"],
        ["#skills", "02.", "Focus Areas"],
        ["#projects", "03.", "Achievements"],
        ["#philosophy", "04.", "Mindset"],
        ["#services", "05.", "Expertise"],
        ["#contact", "06.", "Contact"]
      ].filter(([href]) => document.querySelector(href));

      const signature = items.map(([href]) => href).join("|");
      const current = Array.from(nav.querySelectorAll("a.nav-link-tech"))
        .map(link => link.getAttribute("href"))
        .join("|");

      if (current !== signature) {
        nav.innerHTML = items.map(([href, number, label]) => {
          const contactClass = href === "#contact" ? " mobile-contact-link" : "";
          return `<a href="${href}" class="nav-link-tech${contactClass}"><span>${number}</span> ${label}</a>`;
        }).join("");
      }

      if (nav.dataset.mobileNavReady) return;
      nav.dataset.mobileNavReady = "true";
      nav.addEventListener("click", event => {
        const link = event.target.closest("a.nav-link-tech");
        if (!link) return;

        const hash = link.getAttribute("href");
        const section = hash ? document.querySelector(hash) : null;
        if (!section) return;

        event.preventDefault();
        const navbar = document.querySelector(".navbar-tech");
        const toggle = document.querySelector(".nav-toggle-tech");
        const offset = Math.max((navbar?.offsetHeight || 0) + 18, 92);

        if (toggle && (navbar?.classList.contains("menu-open") || nav.classList.contains("mobile-open"))) {
          toggle.click();
        }
        setTimeout(() => {
          navbar?.classList.remove("menu-open");
          nav.classList.remove("mobile-open");
          toggle?.setAttribute("aria-expanded", "false");
          toggle?.setAttribute("aria-label", "Open menu");
        }, 0);

        const top = section.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: Math.max(top, 0), behavior: "smooth" });
        window.history.pushState(null, "", hash);
      });
    };
    window.addEventListener("load", normalizeMobileNavigation);
    window.addEventListener("resize", normalizeMobileNavigation);
    setTimeout(normalizeMobileNavigation, 100);
    setTimeout(normalizeMobileNavigation, 500);
    new MutationObserver(normalizeMobileNavigation).observe(document.documentElement, { childList: true, subtree: true });

      const revealAchievementDivider = () => {
        document.querySelectorAll('.section-divider').forEach(divider => {
          if (divider.dataset.revealReady) return;
          divider.dataset.revealReady = 'true';
          const showDivider = () => divider.classList.add('divider-visible');
          if (!('IntersectionObserver' in window)) {
            showDivider();
            return;
          }
          const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                showDivider();
                observer.unobserve(divider);
              }
            });
          }, { threshold: 0.2, rootMargin: '0px 0px -12% 0px' });
          observer.observe(divider);
        });
      };
      const animateAchievementCounters = () => {
        document.querySelectorAll('#projects .cases-stats').forEach(stats => {
          if (stats.dataset.countersReady) return;
          const values = Array.from(stats.querySelectorAll('.case-stat-value'));
          if (values.length < 4) return;
          stats.dataset.countersReady = 'true';

          const targets = [
            { value: 10, prefix: '', suffix: '+' },
            { value: 5, prefix: '', suffix: '' },
            { value: 550, prefix: 'â‚¬', suffix: 'K+' },
            { value: 6, prefix: '', suffix: '' }
          ];

          const format = (target, value) => `${target.prefix}${value}${target.suffix}`;
          const setProgress = (index, value) => {
            values[index].textContent = format(targets[index], value);
          };
          const items = Array.from(stats.querySelectorAll('.case-stat'));
          const setItemState = (index, visible) => {
            const item = stats.children[index];
            if (!item) return;
            item.style.opacity = visible ? '' : '0';
            item.style.transform = visible ? '' : 'translateY(14px)';
            item.style.pointerEvents = visible ? '' : 'none';
          };

          const runCounter = index => {
            if (index >= targets.length) {
              items.forEach(item => {
                item.style.opacity = '';
                item.style.transform = '';
                item.style.pointerEvents = '';
              });
              return;
            }
            const target = targets[index];
            const start = performance.now();
            const duration = 1200;
            setItemState(index, true);

            const tick = now => {
              const progress = Math.min((now - start) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              setProgress(index, Math.round(eased * target.value));

              if (progress < 1) {
                requestAnimationFrame(tick);
              } else {
                setProgress(index, target.value);
                stats.children[index]?.classList.add('visible');
                setTimeout(() => runCounter(index + 1), 500);
              }
            };

            stats.children[index]?.classList.add('visible');
            requestAnimationFrame(tick);
          };

          const startCounters = () => {
            if (stats.dataset.countersStarted) return;
            stats.dataset.countersStarted = 'true';
            targets.forEach((target, index) => {
              setProgress(index, 0);
              setItemState(index, false);
            });
            requestAnimationFrame(() => runCounter(0));
          };

          const isStatsVisible = () => {
            const rect = stats.getBoundingClientRect();
            return rect.top < window.innerHeight && rect.bottom > 0;
          };

          const checkVisibility = () => {
            if (!isStatsVisible()) return;
            startCounters();
            window.removeEventListener('scroll', checkVisibility);
            window.removeEventListener('resize', checkVisibility);
            if (observer) observer.disconnect();
          };

          let observer = null;
          if ('IntersectionObserver' in window) {
            observer = new IntersectionObserver(entries => {
              if (entries.some(entry => entry.isIntersecting)) {
                checkVisibility();
              }
            }, { threshold: 0.01, rootMargin: '0px' });
            observer.observe(stats);
          }

          window.addEventListener('scroll', checkVisibility, { passive: true });
          window.addEventListener('resize', checkVisibility);
          requestAnimationFrame(checkVisibility);
        });
      };
      const enhanceFooter = () => {
        document.querySelectorAll('.footer-elegant').forEach(footer => {

          footer.innerHTML = '<div class="container footer-redesign"><div class="footer-brand-block" style="display:block;visibility:visible;opacity:1"><a class="footer-logo" style="display:inline-flex;visibility:visible;opacity:1;color:#fff" href="#top" aria-label="Back to top">ALISA<span>.</span>C<span class="footer-caret">_</span></a><div class="footer-brand-rule" aria-hidden="true"></div></div><nav class="footer-nav-block" aria-label="Footer navigation"><span class="footer-section-label">NAVIGATION</span><div class="footer-nav-grid"><a href="#about">About</a><a href="#skills">Focus Areas</a><a href="#projects">Achievements</a><a href="#philosophy">Mindset</a><a href="#services">Expertise</a><a href="#contact">Contact</a></div></nav><div class="footer-legal-block"><p>Â© ' + new Date().getFullYear() + ' Alisa Chebotarenko</p><p>P.IVA 01820290086</p><div class="footer-legal-items" aria-label="Legal links"><a href="/privacy.html">Privacy Policy</a><a href="/cookies.html">Cookie Policy</a></div></div></div>';
        });
      };
      window.addEventListener('load', enhanceMobileReferenceHero);
      window.addEventListener('load', normalizeMobileHeroCopy);
      window.addEventListener('load', updateContactLinks);
      window.addEventListener('load', revealAchievementDivider);
      window.addEventListener('load', animateAchievementCounters);
      window.addEventListener('load', enhanceFooter);
      setTimeout(enhanceMobileReferenceHero, 100);
      setTimeout(enhanceMobileReferenceHero, 500);
      setTimeout(normalizeMobileHeroCopy, 100);
      setTimeout(normalizeMobileHeroCopy, 500);
      setTimeout(updateContactLinks, 500);
      setTimeout(revealAchievementDivider, 500);
      setTimeout(animateAchievementCounters, 100);
      setTimeout(animateAchievementCounters, 500);
      setTimeout(enhanceFooter, 500);
      new MutationObserver(animateAchievementCounters).observe(document.documentElement, { childList: true, subtree: true });
    </script>
