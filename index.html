<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-alisac.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171142" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Alisa Chebotarenko | PMP Project Manager</title>
    <meta name="description" content="Portfolio personale di Alisa Chebotarenko, Project Manager certificata PMP. Scopri competenze, progetti e contatti." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-portfolio-resultscopy-2b4e8f1.js"></script>
    <script type="module" crossorigin src="/assets/index-portfolio-quote-modal-4b19c8e.js"></script>
    <script type="module">
      const enhanceMobileReferenceHero = () => {
        const textBlock = document.querySelector('.hero .text-block');
        if (!textBlock || textBlock.querySelector('.mobile-ai-headline')) return;
        const headline = document.createElement('div');
        headline.className = 'mobile-ai-headline';
        headline.setAttribute('aria-label', 'Implementing AI in traditional business');
        headline.innerHTML = '<span>IMPLEMENTING AI IN</span><span><span class="accent">TRADITIONAL</span> BUSINESS</span>';
        textBlock.appendChild(headline);
      };
      const updateTelegramLink = () => {
        document.querySelectorAll('a[href="https://t.me/alisachebotarenko"]').forEach(link => {
          link.href = 'https://t.me/alichebo';
        });
      };
      const addWeChatLink = () => {
        document.querySelectorAll('.contact-actions-row').forEach(row => {
          if (row.querySelector('.wechat-icon')) return;
          const openWeChatQr = () => {
            let modal = document.querySelector('.wechat-qr-modal');
            if (!modal) {
              modal = document.createElement('div');
              modal.className = 'wechat-qr-modal';
              modal.setAttribute('role', 'dialog');
              modal.setAttribute('aria-modal', 'true');
              modal.setAttribute('aria-label', 'WeChat QR code');
              modal.innerHTML = '<div class="wechat-qr-backdrop" data-close-wechat></div><div class="wechat-qr-card"><button class="wechat-qr-close" type="button" aria-label="Close WeChat QR" data-close-wechat>×</button><span class="wechat-qr-kicker">WECHAT</span><h3>Scan to connect</h3><img src="/wechat-qr.jpeg" alt="WeChat QR code for Alisa" loading="lazy"><p>WeChat ID: <strong>alichebo</strong></p></div>';
              document.body.appendChild(modal);
              modal.addEventListener('click', event => {
                if (event.target.matches('[data-close-wechat]')) {
                  modal.classList.remove('is-open');
                  document.body.classList.remove('wechat-modal-open');
                }
              });
              window.addEventListener('keydown', event => {
                if (event.key === 'Escape' && modal.classList.contains('is-open')) {
                  modal.classList.remove('is-open');
                  document.body.classList.remove('wechat-modal-open');
                }
              });
            }
            modal.classList.add('is-open');
            document.body.classList.add('wechat-modal-open');
          };
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'circle-btn-elegant social-icon wechat-icon';
          button.setAttribute('aria-label', 'Open WeChat QR code');
          button.title = 'WeChat: alichebo';
          button.innerHTML = '<svg viewBox="0 0 96 96" aria-hidden="true"><path fill="currentColor" d="M38.4 21.5c-17.2 0-31.1 10.9-31.1 24.3 0 7.5 4.3 14.2 11.1 18.7l-2.5 8.9 10.7-5.5c3.6 1.3 7.6 2.1 11.8 2.1 17.2 0 31.1-10.9 31.1-24.3S55.6 21.5 38.4 21.5Zm-10.5 18a4.4 4.4 0 1 1 0 8.8 4.4 4.4 0 0 1 0-8.8Zm20.9 0a4.4 4.4 0 1 1 0 8.8 4.4 4.4 0 0 1 0-8.8Z"/><path fill="currentColor" d="M88.7 55.6c0-11.8-11.5-21.4-25.7-21.4-.8 0-1.6 0-2.4.1 4.8 4.2 7.7 9.8 7.7 16 0 13.4-13.9 24.3-31.1 24.3h-1.4c4.7 7.3 14.3 12.3 25.2 12.3 3.5 0 6.9-.5 10-1.5l8.8 4.5-2.1-7.4c6.7-4 11-9.8 11-16.9Zm-35.5-3.1a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Zm18.3 0a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Z" opacity=".72"/></svg>';
          button.addEventListener('click', openWeChatQr);
          row.appendChild(button);
        });
      };
  
    const removeMobileNavbarCta = () => {
      if (!window.matchMedia("(max-width: 1100px)").matches) return;
      document.querySelectorAll(".navbar-tech .btn-tech").forEach((link) => link.remove());
    };
    window.addEventListener("load", removeMobileNavbarCta);
    window.addEventListener("resize", removeMobileNavbarCta);
    setTimeout(removeMobileNavbarCta, 100);
    setTimeout(removeMobileNavbarCta, 500);
    new MutationObserver(removeMobileNavbarCta).observe(document.documentElement, { childList: true, subtree: true });


    const removeContactCountryField = () => {
      document.querySelectorAll(".contact-form-card select[name=\"country\"], .contact-form-card select[name=\"origin_country\"]").forEach((select) => {
        const row = select.closest(".contact-form-row");
        select.remove();
        if (row) row.classList.add("no-country");
      });
    };
    window.addEventListener("load", removeContactCountryField);
    setTimeout(removeContactCountryField, 100);
    setTimeout(removeContactCountryField, 500);
    new MutationObserver(removeContactCountryField).observe(document.documentElement, { childList: true, subtree: true });

    const updateContactLinks = () => {
        updateTelegramLink();
        addWeChatLink();
      };
      const revealAchievementDivider = () => {
        document.querySelectorAll('.section-divider').forEach(divider => {
          if (divider.dataset.revealReady) return;
          divider.dataset.revealReady = 'true';
          const showDivider = () => divider.classList.add('divider-visible');
          if (!('IntersectionObserver' in window)) {
            showDivider();
            return;
          }
          const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                showDivider();
                observer.unobserve(divider);
              }
            });
          }, { threshold: 0.2, rootMargin: '0px 0px -12% 0px' });
          observer.observe(divider);
        });
      };
      const enhanceFooter = () => {
        document.querySelectorAll('.footer-elegant').forEach(footer => {
          if (footer.querySelector('.footer-redesign')) return;
          footer.innerHTML = '<div class="container footer-redesign"><div class="footer-brand-block" style="display:block;visibility:visible;opacity:1"><a class="footer-logo" style="display:inline-flex;visibility:visible;opacity:1;color:#fff" href="#top" aria-label="Back to top">ALISA<span>.</span>C<span class="footer-caret">_</span></a><div class="footer-brand-rule" aria-hidden="true"></div></div><nav class="footer-nav-block" aria-label="Footer navigation"><span class="footer-section-label">NAVIGATION</span><div class="footer-nav-grid"><a href="#about">About</a><a href="#skills">Focus Areas</a><a href="#projects">Achievements</a><a href="#philosophy">Mindset</a><a href="#services">Expertise</a><a href="#contact">Contact</a></div></nav><div class="footer-legal-block"><p>© ' + new Date().getFullYear() + ' Alisa Chebotarenko</p><p>P.IVA 01820290086</p><div class="footer-legal-items" aria-label="Legal links"><span>Privacy Policy</span><span>Cookie Policy</span></div></div></div>';
        });
      };
      window.addEventListener('load', enhanceMobileReferenceHero);
      window.addEventListener('load', updateContactLinks);
      window.addEventListener('load', revealAchievementDivider);
      window.addEventListener('load', enhanceFooter);
      setTimeout(enhanceMobileReferenceHero, 100);
      setTimeout(enhanceMobileReferenceHero, 500);
      setTimeout(updateContactLinks, 500);
      setTimeout(revealAchievementDivider, 500);
      setTimeout(enhanceFooter, 500);
    </script>
    <link rel="stylesheet" crossorigin href="/assets/index-portfolio-quotemodalalign-6d2c9b4.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
