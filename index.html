<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alisa Chebotarenko | PMP Project Manager</title>
    <meta name="description" content="Portfolio personale di Alisa Chebotarenko, Project Manager certificata PMP. Scopri competenze, progetti e contatti." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-portfolio-contactapi-91fd3b7.js"></script>
    <script type="module">
      const updateTelegramLink = () => {
        document.querySelectorAll('a[href="https://t.me/alisachebotarenko"]').forEach(link => {
          link.href = 'https://t.me/alichebo';
        });
      };
      const addWeChatLink = () => {
        document.querySelectorAll('.contact-actions-row').forEach(row => {
          if (row.querySelector('.wechat-icon')) return;
          const openWeChatQr = () => {
            let modal = document.querySelector('.wechat-qr-modal');
            if (!modal) {
              modal = document.createElement('div');
              modal.className = 'wechat-qr-modal';
              modal.setAttribute('role', 'dialog');
              modal.setAttribute('aria-modal', 'true');
              modal.setAttribute('aria-label', 'WeChat QR code');
              modal.innerHTML = '<div class="wechat-qr-backdrop" data-close-wechat></div><div class="wechat-qr-card"><button class="wechat-qr-close" type="button" aria-label="Close WeChat QR" data-close-wechat>×</button><span class="wechat-qr-kicker">WECHAT</span><h3>Scan to connect</h3><img src="/wechat-qr.jpeg" alt="WeChat QR code for Alisa" loading="lazy"><p>WeChat ID: <strong>alichebo</strong></p></div>';
              document.body.appendChild(modal);
              modal.addEventListener('click', event => {
                if (event.target.matches('[data-close-wechat]')) {
                  modal.classList.remove('is-open');
                  document.body.classList.remove('wechat-modal-open');
                }
              });
              window.addEventListener('keydown', event => {
                if (event.key === 'Escape' && modal.classList.contains('is-open')) {
                  modal.classList.remove('is-open');
                  document.body.classList.remove('wechat-modal-open');
                }
              });
            }
            modal.classList.add('is-open');
            document.body.classList.add('wechat-modal-open');
          };
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'circle-btn-elegant social-icon wechat-icon';
          button.setAttribute('aria-label', 'Open WeChat QR code');
          button.title = 'WeChat: alichebo';
          button.innerHTML = '<svg viewBox="0 0 96 96" aria-hidden="true"><path fill="currentColor" d="M38.4 21.5c-17.2 0-31.1 10.9-31.1 24.3 0 7.5 4.3 14.2 11.1 18.7l-2.5 8.9 10.7-5.5c3.6 1.3 7.6 2.1 11.8 2.1 17.2 0 31.1-10.9 31.1-24.3S55.6 21.5 38.4 21.5Zm-10.5 18a4.4 4.4 0 1 1 0 8.8 4.4 4.4 0 0 1 0-8.8Zm20.9 0a4.4 4.4 0 1 1 0 8.8 4.4 4.4 0 0 1 0-8.8Z"/><path fill="currentColor" d="M88.7 55.6c0-11.8-11.5-21.4-25.7-21.4-.8 0-1.6 0-2.4.1 4.8 4.2 7.7 9.8 7.7 16 0 13.4-13.9 24.3-31.1 24.3h-1.4c4.7 7.3 14.3 12.3 25.2 12.3 3.5 0 6.9-.5 10-1.5l8.8 4.5-2.1-7.4c6.7-4 11-9.8 11-16.9Zm-35.5-3.1a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Zm18.3 0a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Z" opacity=".72"/></svg>';
          button.addEventListener('click', openWeChatQr);
          row.appendChild(button);
        });
      };
      const updateContactLinks = () => {
        updateTelegramLink();
        addWeChatLink();
      };
      const enhanceFooter = () => {
        document.querySelectorAll('.footer-elegant').forEach(footer => {
          if (footer.querySelector('.footer-redesign')) return;
          footer.innerHTML = '<div class="container footer-redesign"><div class="footer-brand-block"><a class="footer-logo" href="#top" aria-label="Back to top">ALISA<span>.</span>C<span class="footer-caret">_</span></a><div class="footer-brand-rule" aria-hidden="true"></div></div><nav class="footer-nav-block" aria-label="Footer navigation"><span class="footer-section-label">NAVIGATION</span><div class="footer-nav-grid"><a href="#about">About</a><a href="#skills">Focus Areas</a><a href="#projects">Achievements</a><a href="#philosophy">Mindset</a><a href="#services">Expertise</a><a href="#contact">Contact</a></div></nav><div class="footer-legal-block"><p>© ' + new Date().getFullYear() + ' Alisa Chebotarenko</p><p>P.IVA 01820290086</p><div class="footer-legal-items" aria-label="Legal links"><span>Privacy Policy</span><span>Cookie Policy</span></div></div></div>';
        });
      };
      const startupOffers = [
        {
          title: 'Startup Operations Setup',
          price: 'from €2,500',
          description: '<p>Building the operational foundation for sustainable growth. I help founders establish clear processes, communication flows, team responsibilities, and decision-making structures that reduce chaos and improve execution.</p><p><strong>What&#39;s included:</strong></p><ul><li>Discovery Session</li><li>Founder and key stakeholder interviews</li><li>Operational process review</li><li>Team structure assessment</li><li>Role and responsibility mapping</li><li>Communication workflow recommendations</li><li>Startup Operations Report</li><li>Growth Roadmap</li><li>Online presentation of findings</li></ul><p><strong>Duration:</strong> up to 10 business days</p><p class="not-included"><strong>Not included:</strong> implementation, software setup, recruitment, project management, employee training, or ongoing operational support.</p>'
        },
        {
          title: 'Delivery & Execution Leadership',
          price: 'from €2,000/month',
          description: '<p>Helping startups turn plans into results. I work alongside founders and teams to align priorities, improve accountability, coordinate execution, and maintain momentum across critical initiatives.</p><p><strong>What&#39;s included:</strong></p><ul><li>Initial assessment of priorities and workflows</li><li>Weekly coordination sessions</li><li>Execution and delivery tracking</li><li>Team alignment support</li><li>Risk and blocker identification</li><li>Stakeholder communication support</li><li>Monthly progress review</li></ul><p><strong>Duration:</strong> monthly engagement (minimum 1 month)</p><p class="not-included"><strong>Not included:</strong> full-time operational management, hiring decisions, direct team supervision, software development management, or executive authority within the company.</p>'
        },
        {
          title: 'Founder & Team Execution Review',
          price: 'from €1,500',
          description: '<p>An independent assessment of a team&#39;s ability to execute its vision. I evaluate leadership, communication, role alignment, accountability, and operational readiness to identify strengths, risks, and barriers to growth.</p><p><strong>What&#39;s included:</strong></p><ul><li>Discovery Session</li><li>Founder interviews</li><li>Team structure review</li><li>Role and responsibility analysis</li><li>Communication and decision-making assessment</li><li>Identification of execution risks</li><li>Executive Summary with recommendations</li><li>Online discussion of findings</li></ul><p><strong>Duration:</strong> up to 7 business days</p><p class="not-included"><strong>Not included:</strong> psychological evaluation, recruitment services, performance reviews, legal due diligence, or ongoing coaching and mentoring.</p>'
        }
      ];
      const enhanceStartupExpertise = () => {
        const services = document.querySelector('#services');
        if (!services) return;
        const activeTitle = services.querySelector('.services-book-tab.active .services-book-title');
        const grid = services.querySelector('.services-offers-grid');
        if (!activeTitle || !grid || activeTitle.textContent.trim().toUpperCase() !== 'STARTUP') return;
        if (grid.dataset.startupEnhanced === 'true') return;
        grid.dataset.startupEnhanced = 'true';
        grid.innerHTML = startupOffers.map((offer, index) => '<article class="service-offer-card"><div class="service-offer-head"><span class="service-offer-index">0' + (index + 1) + ' // STARTUP</span><h3>' + offer.title + '</h3></div><div class="service-offer-description">' + offer.description + '</div><p class="service-offer-price">' + offer.price + '</p><a href="#contact" class="service-offer-book">Book -></a></article>').join('');
      };
      const enhanceInvestorPrices = () => {
        const services = document.querySelector('#services');
        if (!services) return;
        const activeTitle = services.querySelector('.services-book-tab.active .services-book-title');
        if (!activeTitle || activeTitle.textContent.trim().toUpperCase() !== 'INVESTOR') return;
        services.querySelectorAll('.service-offer-price').forEach(price => {
          const text = price.textContent.trim();
          if (text && !text.toLowerCase().startsWith('from ')) {
            price.textContent = 'from ' + text;
          }
        });
      };
      const watchStartupExpertise = () => {
        const services = document.querySelector('#services');
        enhanceStartupExpertise();
        enhanceInvestorPrices();
        document.querySelectorAll('#services .services-book-tab').forEach(tab => {
          if (tab.dataset.startupWatch === 'true') return;
          tab.dataset.startupWatch = 'true';
          tab.addEventListener('click', () => setTimeout(() => {
            enhanceStartupExpertise();
            enhanceInvestorPrices();
          }, 0));
        });
        if (services && services.dataset.startupObserver !== 'true') {
          services.dataset.startupObserver = 'true';
          new MutationObserver(() => {
            enhanceStartupExpertise();
            enhanceInvestorPrices();
          }).observe(services, { childList: true, subtree: true });
        }
      };
      window.addEventListener('load', updateContactLinks);
      window.addEventListener('load', enhanceFooter);
      window.addEventListener('load', watchStartupExpertise);
      setTimeout(updateContactLinks, 500);
      setTimeout(enhanceFooter, 500);
      setTimeout(watchStartupExpertise, 500);
      setTimeout(watchStartupExpertise, 1200);
    </script>
    <link rel="stylesheet" crossorigin href="/assets/index-portfolio-contactthanks-4c8a19e.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
